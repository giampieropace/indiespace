<footer class="container fade-in" 
        hx-get="/data/sitedata.json" 
        hx-trigger="load" 
        hx-swap="json"
        hx-on::after-request="this.classList.add('loaded')">
    
    <nav class="footer__links">
        <ul class="footer__links-list">
            <template json-each="footerLinks">
                <li class="footer__link-item">
                    <a class="footer__link" 
                       @href="`${url || '#'}`" 
                       @title="`${altText || ''}`" 
                       target="_blank" 
                       rel="noopener noreferrer">
                        <template json-if="icon">
                            <img class="footer__link-icon" 
                                 @src="`/assets/img/social/${icon}.svg`" 
                                 @alt="`${altText || ''}`"
                                 loading="lazy">
                        </template>
                        <span class="footer__link-label">${label}</span>
                    </a>
                </li>    
            </template>
        </ul>
    </nav>
    
    <p class="footer__copyright">${copyrightText || '© ' + new Date().getFullYear()}</p>
</footer>
